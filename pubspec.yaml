name: vpnstore
description: VPNStore - Secure VPN Client
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_v2ray: ^1.0.10
  provider: ^6.1.2
  dio: ^5.4.3
  shared_preferences: ^2.2.3
  crypto: ^3.0.3
  mobile_scanner: ^5.2.3
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
