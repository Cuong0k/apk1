name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons
        run: |
          sudo apt-get install -y imagemagick -qq
          for size_dir in "36:mipmap-ldpi" "48:mipmap-mdpi" "72:mipmap-hdpi" "96:mipmap-xhdpi" "144:mipmap-xxhdpi" "192:mipmap-xxxhdpi"; do
            size="${size_dir%%:*}"
            dir="${size_dir##*:}"
            mkdir -p "android/app/src/main/res/$dir"
            convert -size ${size}x${size} xc:"#0D47A1" \
              -fill "#00BCD4" -draw "circle $((size/2)),$((size/2)) $((size/2)),$((size/4))" \
              "android/app/src/main/res/$dir/ic_launcher.png"
          done

      - name: Build APK
        run: flutter build apk --release --no-obfuscate

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vpnstore-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
