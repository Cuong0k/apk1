name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Clash Meta native libs
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          curl -L "https://github.com/Cuong0k/apk1/releases/download/native-libs-v1/libclash.so" \
               -o android/app/src/main/jniLibs/arm64-v8a/libclash.so
          echo "libclash.so: $(du -sh android/app/src/main/jniLibs/arm64-v8a/libclash.so)"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release --no-obfuscate

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vpnstore-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
