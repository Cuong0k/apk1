name: Build Android APK

on:
  push:
    branches: [main, meta]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Build libclash.so from source
        run: |
          set -e

          # Force all git operations to use HTTPS instead of SSH
          git config --global url."https://github.com/".insteadOf "git@github.com:"

          # Try FlClash's Clash.Meta fork first; fall back to upstream metacubex/mihomo
          echo "Cloning FlClash to get Clash.Meta submodule..."
          git clone --depth=1 https://github.com/chen08209/FlClash.git /tmp/flclash

          cd /tmp/flclash
          if git submodule update --init --depth=1 core/Clash.Meta 2>&1; then
            echo "Got FlClash Clash.Meta"
            CLASH_META_SRC="/tmp/flclash/core/Clash.Meta"
          else
            echo "Clash.Meta submodule unavailable — using upstream metacubex/mihomo Alpha"
            git clone --depth=1 --branch Alpha \
              https://github.com/metacubex/mihomo.git /tmp/mihomo
            CLASH_META_SRC="/tmp/mihomo"
          fi
          cd -

          cp -r "$CLASH_META_SRC" ./core/Clash.Meta
          echo "Clash.Meta ready at ./core/Clash.Meta"

          # Find NDK arm64 clang
          NDK_CC=$(which aarch64-linux-android21-clang 2>/dev/null || \
                   find /usr/local/lib/android/sdk/ndk -name "aarch64-linux-android21-clang" 2>/dev/null | head -1 || \
                   find /opt -name "aarch64-linux-android*-clang" 2>/dev/null | head -1)
          echo "Using NDK CC: $NDK_CC"
          test -n "$NDK_CC" || (echo "NDK clang not found!" && exit 1)

          # Build libclash.so for arm64-v8a
          cd core
          GOOS=android GOARCH=arm64 CGO_ENABLED=1 CC="$NDK_CC" \
            CFLAGS="-O3" \
            go build \
              -ldflags="-w -s" \
              -tags="with_gvisor" \
              -buildmode=c-shared \
              -o libclash.so \
              .

          # Place in both jniLibs locations CMake and Gradle need
          mkdir -p ../android/core/src/main/jniLibs/arm64-v8a
          mkdir -p ../android/app/src/main/jniLibs/arm64-v8a
          cp libclash.so ../android/core/src/main/jniLibs/arm64-v8a/libclash.so
          cp libclash.so ../android/app/src/main/jniLibs/arm64-v8a/libclash.so

          ls -lh ../android/core/src/main/jniLibs/arm64-v8a/
          ls -lh ../android/app/src/main/jniLibs/arm64-v8a/

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons --dart-define=APP_ENV=stable

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vpnstore-meta-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          overwrite: true
