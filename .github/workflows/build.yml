name: Build Android APK

on:
  push:
    branches: [main, meta]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Get libclash.so (FlClash release → fallback source build)
        run: |
          set -e
          git config --global url."https://github.com/".insteadOf "git@github.com:"

          JNILIBS_CORE=android/core/src/main/jniLibs/arm64-v8a
          JNILIBS_APP=android/app/src/main/jniLibs/arm64-v8a
          mkdir -p "$JNILIBS_CORE" "$JNILIBS_APP"

          # ── Try pre-built libclash.so from FlClash official release ────────
          echo "=== Fetching FlClash latest release ==="
          RELEASE_JSON=$(curl -sf "https://api.github.com/repos/chen08209/FlClash/releases/latest" || true)

          if [ -n "$RELEASE_JSON" ]; then
            APK_URL=$(echo "$RELEASE_JSON" | grep '"browser_download_url"' \
              | grep -i 'android' | grep -i 'arm64' | grep -v 'universal' \
              | head -1 | cut -d'"' -f4)
            [ -z "$APK_URL" ] && APK_URL=$(echo "$RELEASE_JSON" | grep '"browser_download_url"' \
              | grep -i 'android' | head -1 | cut -d'"' -f4)
          fi

          if [ -n "$APK_URL" ]; then
            echo "Downloading: $APK_URL"
            if curl -sfL -o /tmp/flclash.apk "$APK_URL"; then
              mkdir -p /tmp/flclash_apk
              if unzip -o /tmp/flclash.apk "lib/arm64-v8a/libclash.so" -d /tmp/flclash_apk 2>/dev/null; then
                SO=/tmp/flclash_apk/lib/arm64-v8a/libclash.so
                if [ -f "$SO" ] && [ "$(stat -c%s "$SO")" -gt 1000000 ]; then
                  echo "✓ Got libclash.so from FlClash release ($(stat -c%s "$SO") bytes)"
                  cp "$SO" "$JNILIBS_CORE/libclash.so"
                  cp "$SO" "$JNILIBS_APP/libclash.so"
                  echo "LIBCLASH_SOURCE=release" >> "$GITHUB_ENV"
                fi
              fi
            fi
          fi

          # ── Fallback: build from source using FlClash's pinned mihomo submodule ──
          # (must match the API the bridge code in core/*.go was written against;
          # the latest mihomo Alpha HEAD renames/removes symbols and breaks the build)
          if [ "${LIBCLASH_SOURCE:-}" != "release" ]; then
            echo "=== Building libclash.so from source ==="
            git clone --depth=1 https://github.com/chen08209/FlClash.git /tmp/flclash
            cd /tmp/flclash
            git submodule update --init --depth=1 core/Clash.Meta
            cd -
            cp -r /tmp/flclash/core/Clash.Meta ./core/Clash.Meta

            NDK_CC=$(which aarch64-linux-android21-clang 2>/dev/null || \
                     find /usr/local/lib/android/sdk/ndk -name "aarch64-linux-android21-clang" 2>/dev/null | head -1 || \
                     find /opt -name "aarch64-linux-android*-clang" 2>/dev/null | head -1)
            test -n "$NDK_CC" || (echo "NDK clang not found!" && exit 1)

            cd core
            GOOS=android GOARCH=arm64 CGO_ENABLED=1 CC="$NDK_CC" CFLAGS="-O3" \
              go build -ldflags="-w -s" -tags="with_gvisor" -buildmode=c-shared -o libclash.so .
            cd -
            cp core/libclash.so "$JNILIBS_CORE/libclash.so"
            cp core/libclash.so "$JNILIBS_APP/libclash.so"
            echo "✓ Built libclash.so from source"
          fi

          ls -lh "$JNILIBS_APP/libclash.so"

      - name: Get Flutter dependencies
        run: flutter pub get

      # ── BUILD 1: VPN Store (client-user.jiangsuhk.com) ───────────────────
      - name: Build APK — VPN Store
        run: |
          flutter build apk --release --no-tree-shake-icons --dart-define=APP_ENV=stable \
            --obfuscate --split-debug-info=build/debug-info/vpnstore

      - name: Save VPN Store APK
        run: cp build/app/outputs/flutter-apk/app-release.apk /tmp/vpnstore-release.apk

      # ── PATCH SOURCE → Beno VPN (brand: Beno VPN, API: client.qingniaows.com) ──
      - name: Patch source for Beno VPN build
        run: |
          set -e

          DART_FILES=(
            lib/auth/auth_storage.dart
            lib/auth/login_page.dart
            lib/common/constant.dart
            lib/common/preferences.dart
            lib/providers/action.dart
            lib/pages/token_login.dart
          )

          # Domain / URLs — actual API endpoint is client.qingniaows.com
          sed -i "s|https://client-user\.jiangsuhk\.com|https://client.qingniaows.com|g" "${DART_FILES[@]}"
          sed -i "s|client-user\.jiangsuhk\.com|client.qingniaows.com|g" "${DART_FILES[@]}"

          # App name
          sed -i "s|VPN Store|Beno VPN|g" "${DART_FILES[@]}"

          # SharedPreferences token key
          sed -i "s|vpnstore_token|benovpn_token|g" lib/common/preferences.dart

          # Android applicationId
          sed -i 's|com\.vpnstore\.meta|com.benovpn.meta|g' android/app/build.gradle.kts

          # Android app labels
          sed -i 's|android:label="VPN Store"|android:label="Beno VPN"|g' \
            android/app/src/main/AndroidManifest.xml
          sed -i 's|VPN Store|Beno VPN|g' \
            android/common/src/main/res/values/strings.xml

          echo "=== Verifying Beno VPN patch ==="
          grep -n "benovpn\|Beno VPN" lib/auth/auth_storage.dart lib/common/constant.dart \
            android/app/build.gradle.kts || true

      # ── BUILD 2: Beno VPN (benovpn.com) ──────────────────────────────────
      - name: Build APK — Beno VPN
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons --dart-define=APP_ENV=stable \
            --obfuscate --split-debug-info=build/debug-info/benovpn

      - name: Save Beno VPN APK
        run: cp build/app/outputs/flutter-apk/app-release.apk /tmp/benovpn-release.apk

      # ── UPLOAD BOTH ARTIFACTS ─────────────────────────────────────────────
      - name: Upload VPN Store APK
        uses: actions/upload-artifact@v4
        with:
          name: vpnstore-meta-apk
          path: /tmp/vpnstore-release.apk
          overwrite: true

      - name: Upload Beno VPN APK
        uses: actions/upload-artifact@v4
        with:
          name: benovpn-meta-apk
          path: /tmp/benovpn-release.apk
          overwrite: true
