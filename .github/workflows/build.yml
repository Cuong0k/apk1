name: Build Android APK

on:
  push:
    branches: [main, meta]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Download pre-built libclash.so
        run: |
          mkdir -p android/core/src/main/jniLibs/arm64-v8a
          curl -L -o android/core/src/main/jniLibs/arm64-v8a/libclash.so \
            https://github.com/Cuong0k/apk1/releases/download/native-libs-v1/libclash.so
          ls -lh android/core/src/main/jniLibs/arm64-v8a/

      - name: Build libcore.so with NDK
        run: |
          NDK_CLANG="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++"
          CPP_DIR="android/core/src/main/cpp"
          JNI_DIR="android/core/src/main/jniLibs/arm64-v8a"
          $NDK_CLANG -shared -fPIC -DLIBCLASH -O2 \
            -I "$CPP_DIR" \
            -I "$CPP_DIR/includes/arm64-v8a" \
            -L "$JNI_DIR" \
            "$CPP_DIR/jni_helper.cpp" \
            "$CPP_DIR/core.cpp" \
            -lclash -llog \
            -o "$JNI_DIR/libcore.so"
          ls -lh "$JNI_DIR/"

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vpnstore-meta-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          overwrite: true
